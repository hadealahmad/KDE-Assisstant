<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KDE Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="header-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="accent-icon"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                    <h2>KDE Assistant</h2>
                </div>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <button id="new-chat-btn" class="icon-btn-outline" title="New Chat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    </button>
                    <button id="close-sidebar-btn" class="icon-btn" title="Close Sidebar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <!-- Segmented Tabs (Shadcn style) -->
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-tab="sessions">Chats</button>
                <button class="tab-btn" data-tab="tasks">Tasks</button>
                <button class="tab-btn" data-tab="memories">Memories</button>
            </div>

            <!-- Tab Content Containers -->
            <div class="tab-contents scroll-area">
                <!-- Chats List -->
                <div id="sessions-list" class="tab-content-panel active">
                    <!-- Dynamically populated -->
                </div>

                <!-- Tasks List -->
                <div id="tasks-list" class="tab-content-panel">
                    <!-- Dynamically populated -->
                </div>

                <!-- Memories List -->
                <div id="memories-list" class="tab-content-panel">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-container">
            <header id="chat-header">
                <button id="menu-toggle-btn" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                </button>
                <h1 id="session-title">New Chat</h1>
                <div class="header-actions">
                    <button id="header-new-chat-btn" class="icon-btn-outline" title="New Chat">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        <span>New Chat</span>
                    </button>
                </div>
            </header>

            <!-- Chat flow area -->
            <section id="chat-flow" class="scroll-area">
                <div class="empty-state">
                    <div class="assistant-logo-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                    </div>
                    <h3>KDE Assistant Mobile Portal</h3>
                    <p>Interact with your local LLM model and desktop tools. Your commands can be monitored and approved here.</p>
                </div>
            </section>

            <!-- Input area -->
            <footer id="chat-input-container">
                <div class="input-wrapper">
                    <textarea id="prompt-input" placeholder="Ask KDE Assistant anything..." rows="1" dir="auto"></textarea>
                    <button id="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <!-- Token Authentication Modal Overlay -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content animate-in">
            <div class="auth-icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h3>Enter Access Passcode</h3>
            <p>Please enter the 6-character access passcode shown on your computer's KDE settings screen.</p>
            <input type="text" id="passcode-input" autocomplete="off" autofocus maxlength="6" placeholder="XXXXXX">
            <button id="auth-submit-btn">Verify and Connect</button>
            <p id="auth-error-msg" class="error-text"></p>
        </div>
    </div>

    <!-- Client app script -->
    <script src="app.js"></script>
</body>
</html>
