<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        var recognition;
        
        function startSpeechRecognition(langCode) {
            console.log("STT_HTML: Starting speech recognition for lang: " + langCode);
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.log("STT_ERROR:SpeechRecognition API not found in this browser engine.");
                return;
            }
            
            try {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = langCode || 'en-US';
                
                recognition.onstart = function() {
                    console.log("STT_STATUS:LISTENING");
                };
                
                recognition.onerror = function(event) {
                    console.log("STT_ERROR:Recognition error: " + event.error);
                };
                
                recognition.onend = function() {
                    console.log("STT_STATUS:STOPPED");
                };
                
                recognition.onresult = function(event) {
                    if (event.results && event.results[0] && event.results[0][0]) {
                        var text = event.results[0][0].transcript;
                        console.log("STT_TRANSCRIPT:" + text);
                    } else {
                        console.log("STT_ERROR:No transcript in results.");
                    }
                };
                
                recognition.start();
                console.log("STT_HTML: recognition.start() called successfully.");
            } catch (e) {
                console.log("STT_ERROR:Exception during start: " + e.message);
            }
        }
        
        function stopSpeechRecognition() {
            console.log("STT_HTML: Stopping speech recognition.");
            if (recognition) {
                recognition.stop();
            }
        }
    </script>
</head>
<body>
</body>
</html>
